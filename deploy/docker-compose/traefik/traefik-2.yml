# Traefik static config for agent traefik-2.

global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"
  tcpentry:
    address: ":9000/tcp"

experimental:
  localPlugins:
    fleet:
      moduleName: github.com/danielfree19/proxydock/providers/traefik-fleet

providers:
  plugin:
    fleet:
      endpoint: "http://manager-api:8080"
      fleetID: "homelab"
      agentID: "traefik-2"
      tokenFile: "/run/secrets/traefik-fleet-token"
      pollInterval: "5s"
      pollTimeout: "5s"
      cacheFile: "/var/lib/traefik-fleet/last-good.json"
      failMode: "keep-last-good"
      signingPublicKey: "0EqyMnQrtKs6E2i9RhXk5tAiSrcaAWuvhSCjMsl3hzc="
