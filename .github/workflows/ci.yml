name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go (vet + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: |
            apps/api/go.sum
            providers/traefik-fleet/go.sum
      - name: vet manager-api
        working-directory: apps/api
        run: go vet ./...
      - name: test manager-api
        working-directory: apps/api
        run: go test ./...
      - name: vet provider plugin
        working-directory: providers/traefik-fleet
        run: go vet ./...
      - name: test provider plugin
        working-directory: providers/traefik-fleet
        run: go test ./...

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: install
        working-directory: apps/web
        run: npm ci
      - name: build
        working-directory: apps/web
        run: npm run build

  fmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: gofmt -l (must be empty)
        run: |
          OUT=$(gofmt -l apps/api providers/traefik-fleet)
          if [ -n "$OUT" ]; then
            echo "::error::gofmt would change these files:"
            echo "$OUT"
            exit 1
          fi

  postgres-integration:
    name: Postgres integration tests
    runs-on: ubuntu-latest
    # Only run on PRs labeled `run-integration` and pushes to main —
    # they take ~60s and pull a Postgres image, so we don't want them
    # on every commit.
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-integration')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: apps/api/go.sum
      - name: integration tests
        working-directory: apps/api
        run: go test -tags integration ./internal/store/postgres/... -count=1 -timeout 8m
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
